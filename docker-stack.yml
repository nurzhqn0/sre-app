services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sre_app}
      POSTGRES_USER: ${POSTGRES_USER:-sre_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sre_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    configs:
      - source: postgres_init_sql
        target: /docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      restart_policy:
        condition: on-failure

  auth-service:
    image: ${STACK_IMAGE_PREFIX:-sre-app}/auth-service:latest
    environment:
      SERVICE_NAME: auth-service
      PORT: 8001
      DATABASE_URL: postgresql://${POSTGRES_USER:-sre_user}:${POSTGRES_PASSWORD:-sre_password}@postgres:5432/${POSTGRES_DB:-sre_app}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  user-service:
    image: ${STACK_IMAGE_PREFIX:-sre-app}/user-service:latest
    environment:
      SERVICE_NAME: user-service
      PORT: 8002
      DATABASE_URL: postgresql://${POSTGRES_USER:-sre_user}:${POSTGRES_PASSWORD:-sre_password}@postgres:5432/${POSTGRES_DB:-sre_app}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  product-service:
    image: ${STACK_IMAGE_PREFIX:-sre-app}/product-service:latest
    environment:
      SERVICE_NAME: product-service
      PORT: 8003
      DATABASE_URL: postgresql://${POSTGRES_USER:-sre_user}:${POSTGRES_PASSWORD:-sre_password}@postgres:5432/${POSTGRES_DB:-sre_app}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  order-service:
    image: ${STACK_IMAGE_PREFIX:-sre-app}/order-service:latest
    environment:
      SERVICE_NAME: order-service
      PORT: 8004
      DATABASE_URL: postgresql://${POSTGRES_USER:-sre_user}:${POSTGRES_PASSWORD:-sre_password}@postgres:5432/${POSTGRES_DB:-sre_app}
      PRODUCT_SERVICE_URL: http://product-service:8003
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  chat-service:
    image: ${STACK_IMAGE_PREFIX:-sre-app}/chat-service:latest
    environment:
      SERVICE_NAME: chat-service
      PORT: 8005
      DATABASE_URL: postgresql://${POSTGRES_USER:-sre_user}:${POSTGRES_PASSWORD:-sre_password}@postgres:5432/${POSTGRES_DB:-sre_app}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      DEFAULT_CHAT_ROOM: operations
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  prometheus:
    image: prom/prometheus:v3.11.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - prometheus-data:/prometheus
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    ports:
      - target: 9090
        published: ${STACK_PROMETHEUS_PORT:-9091}
        protocol: tcp
        mode: ingress
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana:13.0.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/datasource.yml
      - source: grafana_dashboard_provider
        target: /etc/grafana/provisioning/dashboards/dashboard.yml
      - source: grafana_platform_dashboard
        target: /var/lib/grafana/dashboards/platform-overview.json
    ports:
      - target: 3000
        published: ${STACK_GRAFANA_PORT:-3001}
        protocol: tcp
        mode: ingress
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    image: ${STACK_IMAGE_PREFIX:-sre-app}/frontend:latest
    ports:
      - target: 80
        published: ${STACK_HTTP_PORT:-8080}
        protocol: tcp
        mode: ingress
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  app-network:
    driver: overlay

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

configs:
  postgres_init_sql:
    file: ./postgres/init.sql
  prometheus_config:
    file: ./monitoring/prometheus/prometheus.yml
  grafana_datasource:
    file: ./monitoring/grafana/provisioning/datasources/datasource.yml
  grafana_dashboard_provider:
    file: ./monitoring/grafana/provisioning/dashboards/dashboard.yml
  grafana_platform_dashboard:
    file: ./monitoring/grafana/dashboards/platform-overview.json
