---
- name: Deploy SRE demo stack with Docker Compose
  hosts: sre_demo
  become: true
  gather_facts: false
  vars:
    project_root: "{{ deploy_path | default('/opt/sre-app') }}"
    compose_file: "{{ project_root }}/docker-compose.yml"
    repo_url: "{{ git_repo | default('https://github.com/nurzhqn0/sre-app.git') }}"
    repo_version: "{{ git_version | default('main') }}"
    postgres_db: "{{ lookup('env', 'POSTGRES_DB') | default('sre_app', true) }}"
    postgres_user: "{{ lookup('env', 'POSTGRES_USER') | default('sre_user', true) }}"
    postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') | default('sre_password', true) }}"
    jwt_secret_key: "{{ lookup('env', 'JWT_SECRET_KEY') | default('change-this-jwt-secret', true) }}"
    grafana_admin_user: "{{ lookup('env', 'GRAFANA_ADMIN_USER') | default('admin', true) }}"
    grafana_admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('change-this-grafana-password', true) }}"

  pre_tasks:
    - name: Stop when placeholder inventory is used
      ansible.builtin.assert:
        that:
          - ansible_host | default('') != 'YOUR_VM_IP'
          - ansible_user | default('') != 'YOUR_SSH_USER'
        fail_msg: "Create ansible/inventory.local.ini with your real VM host/user and run: ansible-playbook -i ansible/inventory.local.ini ansible/site.yml"
      delegate_to: localhost
      become: false

    - name: Gather VM facts
      ansible.builtin.setup:

  tasks:
    - name: Install base dependencies on Debian hosts
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - python3
        state: present
        update_cache: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Check Docker CLI availability
      ansible.builtin.command:
        cmd: docker --version
      register: docker_cli
      changed_when: false
      failed_when: false

    - name: Install distro Docker only when Docker is missing
      ansible.builtin.apt:
        name:
          - docker.io
        state: present
      when:
        - ansible_facts["os_family"] == "Debian"
        - docker_cli.rc != 0

    - name: Verify Docker CLI is available
      ansible.builtin.command:
        cmd: docker --version
      register: docker_cli_verify
      changed_when: false

    - name: Check Docker Compose plugin availability
      ansible.builtin.command:
        cmd: docker compose version
      register: compose_plugin
      changed_when: false
      failed_when: false

    - name: Install Docker Compose plugin only when missing
      ansible.builtin.apt:
        name:
          - docker-compose-plugin
        state: present
      when:
        - ansible_facts["os_family"] == "Debian"
        - compose_plugin.rc != 0

    - name: Ensure Docker service is running on Linux hosts
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      when: ansible_facts["system"] == "Linux"

    - name: Create deployment directory
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        mode: "0755"

    - name: Checkout application repository on the VM
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ project_root }}"
        version: "{{ repo_version }}"
        force: true
        update: true

    - name: Write runtime environment file
      ansible.builtin.copy:
        dest: "{{ project_root }}/.env"
        mode: "0600"
        content: |
          POSTGRES_DB={{ postgres_db }}
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_PASSWORD={{ postgres_password }}
          JWT_SECRET_KEY={{ jwt_secret_key }}
          GRAFANA_ADMIN_USER={{ grafana_admin_user }}
          GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
      no_log: true

    - name: Confirm compose file is present
      ansible.builtin.stat:
        path: "{{ compose_file }}"
      register: compose_stat

    - name: Stop when compose file is missing
      ansible.builtin.assert:
        that:
          - compose_stat.stat.exists
        fail_msg: "docker-compose.yml was not found at {{ compose_file }}"

    - name: Validate Docker Compose and monitoring configuration
      ansible.builtin.command:
        cmd: python3 scripts/validate_compose_config.py -f docker-compose.yml
        chdir: "{{ project_root }}"
      changed_when: false

    - name: Deploy application stack
      ansible.builtin.command:
        cmd: docker compose up -d --build
        chdir: "{{ project_root }}"
      register: compose_deploy
      changed_when: "'Started' in compose_deploy.stdout or 'Created' in compose_deploy.stdout or 'Recreated' in compose_deploy.stdout or 'Built' in compose_deploy.stdout"

    - name: Show running compose services
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ project_root }}"
      register: compose_status
      changed_when: false

    - name: Print service status
      ansible.builtin.debug:
        var: compose_status.stdout_lines
