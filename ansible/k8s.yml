---
- name: Deploy SRE demo to k3s on the VM
  hosts: sre_demo
  become: true
  gather_facts: false
  vars:
    project_root: "{{ deploy_path | default('/opt/sre-app') }}"
    repo_url: "{{ git_repo | default('https://github.com/nurzhqn0/sre-app.git') }}"
    repo_version: "{{ git_version | default('main') }}"
    ingress_domain: "{{ app_domain | default('app.example.com') }}"
    letsencrypt_email: "{{ acme_email | default('admin@sre.nurzhqn.com') }}"
    cert_manager_manifest_url: "https://github.com/cert-manager/cert-manager/releases/download/v1.20.2/cert-manager.yaml"
    image_deployments:
      - auth-service
      - user-service
      - product-service
      - order-service
      - chat-service
      - payment-service
      - frontend
    rollout_deployments:
      - postgres
      - auth-service
      - user-service
      - product-service
      - order-service
      - chat-service
      - payment-service
      - frontend
      - prometheus
      - grafana

  pre_tasks:
    - name: Stop when placeholder inventory is used
      ansible.builtin.assert:
        that:
          - ansible_host | default('') != 'YOUR_VM_IP'
          - ansible_user | default('') != 'YOUR_SSH_USER'
        fail_msg: "Create ansible/inventory.local.ini with your real VM host/user and run: ansible-playbook -i ansible/inventory.local.ini ansible/k8s.yml"
      delegate_to: localhost
      become: false

    - name: Gather VM facts
      ansible.builtin.setup:

  tasks:
    - name: Check base dependencies on Debian hosts
      ansible.builtin.command:
        argv:
          - dpkg-query
          - -W
          - -f=${Status}\n
          - ca-certificates
          - curl
          - git
          - python3
      register: base_dependency_check
      changed_when: false
      failed_when: false
      when: ansible_facts["os_family"] == "Debian"

    - name: Install base dependencies on Debian hosts
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - python3
        state: present
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 120
      when: ansible_facts["os_family"] == "Debian"
        and base_dependency_check.rc != 0

    - name: Check Docker CLI availability
      ansible.builtin.command:
        cmd: docker --version
      register: docker_cli
      changed_when: false
      failed_when: false

    - name: Install distro Docker only when Docker is missing
      ansible.builtin.apt:
        name:
          - docker.io
        state: present
      when:
        - ansible_facts["os_family"] == "Debian"
        - docker_cli.rc != 0

    - name: Verify Docker CLI is available
      ansible.builtin.command:
        cmd: docker --version
      register: docker_cli_verify
      changed_when: false

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Check whether k3s is installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Download k3s installer
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/install-k3s.sh
        mode: "0755"
      when: not k3s_binary.stat.exists

    - name: Install k3s with a readable kubeconfig
      ansible.builtin.command:
        cmd: /tmp/install-k3s.sh
      environment:
        INSTALL_K3S_EXEC: "--write-kubeconfig-mode 644"
      when: not k3s_binary.stat.exists

    - name: Wait for Kubernetes API to be ready
      ansible.builtin.command:
        cmd: kubectl get nodes
      register: kubectl_nodes
      changed_when: false
      retries: 12
      delay: 5
      until: kubectl_nodes.rc == 0

    - name: Install or update cert-manager
      ansible.builtin.command:
        cmd: "kubectl apply -f {{ cert_manager_manifest_url }}"
      register: cert_manager_apply
      changed_when: "'created' in cert_manager_apply.stdout or 'configured' in cert_manager_apply.stdout"

    - name: Wait for cert-manager deployments to roll out
      ansible.builtin.command:
        cmd: "kubectl -n cert-manager rollout status deployment/{{ item }} --timeout=180s"
      loop:
        - cert-manager
        - cert-manager-cainjector
        - cert-manager-webhook
      changed_when: false

    - name: Create deployment directory
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        mode: "0755"

    - name: Checkout application repository on the VM
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ project_root }}"
        version: "{{ repo_version }}"
        force: true
        update: true

    - name: Set frontend ingress host for this VM
      ansible.builtin.replace:
        path: "{{ project_root }}/k8s/50-frontend-ingress.yaml"
        regexp: 'host: .*'
        replace: "host: {{ ingress_domain }}"

    - name: Set frontend TLS host for this VM
      ansible.builtin.replace:
        path: "{{ project_root }}/k8s/50-frontend-ingress.yaml"
        regexp: '- sre\.nurzhqn\.com'
        replace: "- {{ ingress_domain }}"

    - name: Set Let's Encrypt account email
      ansible.builtin.replace:
        path: "{{ project_root }}/k8s/60-cert-manager-issuer.yaml"
        regexp: 'email: .*'
        replace: "email: {{ letsencrypt_email }}"

    - name: Build Docker images on the VM
      ansible.builtin.command:
        cmd: ./scripts/build-stack-images.sh
        chdir: "{{ project_root }}"
      changed_when: true

    - name: Import application images into k3s containerd
      ansible.builtin.command:
        cmd: ./scripts/import-k3s-images.sh
        chdir: "{{ project_root }}"
      register: image_import
      changed_when: true

    - name: Apply Kubernetes manifests
      ansible.builtin.command:
        cmd: kubectl apply -f k8s/
        chdir: "{{ project_root }}"
      register: kubectl_apply
      changed_when: "'created' in kubectl_apply.stdout or 'configured' in kubectl_apply.stdout"

    - name: Restart application deployments after image import
      ansible.builtin.command:
        cmd: "kubectl -n sre-app rollout restart deployment/{{ item }}"
      loop: "{{ image_deployments }}"
      register: rollout_restart
      changed_when: "'restarted' in rollout_restart.stdout"
      when: image_import is changed

    - name: Wait for application deployments to roll out
      ansible.builtin.command:
        cmd: "kubectl -n sre-app rollout status deployment/{{ item }} --timeout=120s"
      loop: "{{ rollout_deployments }}"
      loop_control:
        label: "{{ item }}"
      register: rollout_status
      changed_when: false
      failed_when: false

    - name: Print rollout status output
      ansible.builtin.debug:
        msg: "{{ item.item }}: {{ item.stdout | default(item.stderr, true) }}"
      loop: "{{ rollout_status.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Show certificate status
      ansible.builtin.command:
        cmd: kubectl -n sre-app get certificate,certificaterequest,order,challenge
      register: certificate_status
      changed_when: false
      failed_when: false

    - name: Show Kubernetes workload status
      ansible.builtin.command:
        cmd: kubectl -n sre-app get pods,svc,ingress,certificate
      register: kubectl_status
      changed_when: false

    - name: Print certificate status
      ansible.builtin.debug:
        var: certificate_status.stdout_lines

    - name: Print Kubernetes status
      ansible.builtin.debug:
        var: kubectl_status.stdout_lines

    - name: Fail when any deployment did not roll out
      ansible.builtin.assert:
        that:
          - rollout_status.results | selectattr('rc', 'ne', 0) | list | length == 0
        fail_msg: "One or more deployments failed to roll out. Check the rollout and pod status above."
