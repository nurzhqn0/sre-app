apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-cadvisor-scrape
  namespace: sre-app
data:
  note: "Optional cAdvisor manifest. Apply only on local clusters that expose compatible container runtime host paths."
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: sre-app
spec:
  selector:
    matchLabels:
      app: cadvisor
  template:
    metadata:
      labels:
        app: cadvisor
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cadvisor
          image: ghcr.io/google/cadvisor:0.56.2
          args:
            - --housekeeping_interval=10s
            - --store_container_labels=false
          ports:
            - containerPort: 8080
          securityContext:
            privileged: true
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: docker
              mountPath: /var/lib/docker
              readOnly: true
            - name: containerd
              mountPath: /var/lib/containerd
              readOnly: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run
          hostPath:
            path: /var/run
        - name: sys
          hostPath:
            path: /sys
        - name: docker
          hostPath:
            path: /var/lib/docker
            type: DirectoryOrCreate
        - name: containerd
          hostPath:
            path: /var/lib/containerd
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: sre-app
spec:
  selector:
    app: cadvisor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
