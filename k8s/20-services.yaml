apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: sre-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: sre-app/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: SERVICE_NAME
              value: auth-service
            - name: PORT
              value: "8001"
            - name: DATABASE_URL
              value: postgresql://sre_user:sre_password@postgres:5432/sre_app
          envFrom:
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: sre-app
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
---
