apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sre-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: auth-service
        metrics_path: /metrics
        static_configs:
          - targets: ["auth-service:8001"]
      - job_name: user-service
        metrics_path: /metrics
        static_configs:
          - targets: ["user-service:8002"]
      - job_name: product-service
        metrics_path: /metrics
        static_configs:
          - targets: ["product-service:8003"]
      - job_name: order-service
        metrics_path: /metrics
        static_configs:
          - targets: ["order-service:8004"]
      - job_name: chat-service
        metrics_path: /metrics
        static_configs:
          - targets: ["chat-service:8005"]
      - job_name: payment-service
        metrics_path: /metrics
        static_configs:
          - targets: ["payment-service:8006"]
  alerts.yml: |
    groups:
      - name: service-health
        rules:
          - alert: ServiceHealthUnhealthy
            expr: service_health_status == 0
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: Service health check is failing
              description: "{{ $labels.service }} health check is unhealthy."
          - alert: ServiceTargetDown
            expr: up{job=~"auth-service|user-service|product-service|order-service|chat-service|payment-service"} == 0
            for: 30s
            labels:
              severity: critical
            annotations:
              summary: Service target is down
              description: "Prometheus cannot scrape {{ $labels.job }} at {{ $labels.instance }}."
          - alert: ServiceHighP95Latency
            expr: histogram_quantile(0.95, sum by (le, service) (rate(service_http_request_duration_seconds_bucket[5m]))) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Service p95 latency is high
              description: "{{ $labels.service }} p95 latency is above 1 second."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: sre-app
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: sre-app-dashboards
        folder: SRE App
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sre-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.11.2
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: prometheus-config
              mountPath: /etc/prometheus/alerts.yml
              subPath: alerts.yml
              readOnly: true
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sre-app
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sre-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:13.0.1
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GRAFANA_ADMIN_PASSWORD
          volumeMounts:
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
              readOnly: true
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboard.yml
              subPath: dashboard.yml
              readOnly: true
            - name: grafana-platform-dashboard
              mountPath: /var/lib/grafana/dashboards/platform-overview.json
              subPath: platform-overview.json
              readOnly: true
      volumes:
        - name: grafana-provisioning
          configMap:
            name: grafana-provisioning
        - name: grafana-platform-dashboard
          configMap:
            name: grafana-platform-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sre-app
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
