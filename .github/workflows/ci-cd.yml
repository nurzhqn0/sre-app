name: CI/CD

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  ci:
    name: Validate, Build, and Package
    runs-on: ubuntu-latest
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt

      - name: Compile backend modules
        run: python -m compileall -q backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: npm run lint --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Validate Docker Compose syntax
        run: docker compose config --quiet

      - name: Validate deployment configuration
        run: python scripts/validate_compose_config.py -f docker-compose.yml

      - name: Validate Kubernetes YAML
        run: |
          ruby -e 'require "yaml"; files = Dir["k8s/**/*.yaml"]; files.each { |file| YAML.load_stream(File.read(file)) }; puts "validated " + files.length.to_s + " Kubernetes YAML files"'

      - name: Install Ansible
        run: python -m pip install ansible

      - name: Check Ansible syntax
        run: |
          ansible-playbook -i ansible/inventory.ini --syntax-check ansible/site.yml
          ansible-playbook -i ansible/inventory.ini --syntax-check ansible/k8s.yml

      - name: Build application Docker images
        run: ./scripts/build-stack-images.sh

  deploy:
    name: Deploy to k3s VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
      APP_DOMAIN: ${{ vars.APP_DOMAIN != '' && vars.APP_DOMAIN || 'sre.nurzhqn.com' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH != '' && vars.DEPLOY_PATH || '/opt/sre-app' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        run: python -m pip install --upgrade pip && python -m pip install ansible

      - name: Validate deployment secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"

      - name: Configure SSH
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/sre_app_deploy_key"
          chmod 600 "$HOME/.ssh/sre_app_deploy_key"
          ssh-keyscan -p "$VPS_SSH_PORT" "$VPS_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Generate CI inventory
        run: |
          cat > ansible/inventory.ci.ini <<EOF
          [sre_demo]
          sre-vm ansible_host=${VPS_HOST} ansible_user=${VPS_USER} ansible_port=${VPS_SSH_PORT} ansible_ssh_private_key_file=${HOME}/.ssh/sre_app_deploy_key ansible_python_interpreter=/usr/bin/python3

          [sre_demo:vars]
          deploy_path=${DEPLOY_PATH}
          git_repo=https://github.com/${GITHUB_REPOSITORY}.git
          git_version=${GITHUB_SHA}
          app_domain=${APP_DOMAIN}
          EOF

      - name: Deploy with Ansible to k3s
        run: ansible-playbook -i ansible/inventory.ci.ini ansible/k8s.yml

      - name: Verify live frontend
        run: |
          if getent hosts "$APP_DOMAIN" > /dev/null; then
            curl --fail --retry 12 --retry-delay 10 --retry-all-errors "http://${APP_DOMAIN}/"
          else
            echo "APP_DOMAIN ${APP_DOMAIN} does not resolve yet; verifying ingress through VPS IP with Host header."
            curl --fail --retry 12 --retry-delay 10 --retry-all-errors -H "Host: ${APP_DOMAIN}" "http://${VPS_HOST}/"
          fi
